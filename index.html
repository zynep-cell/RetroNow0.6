<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroNow 0.6</title>
    <style>
        /* --- TASARIM (CSS) --- */
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #121212;
            --text-primary: #e0e0e0;
            --text-secondary: #888888;
            --accent-color: #ffffff;
            --border-color: #222222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100%;
        }

        .sidebar {
            width: 360px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: var(--bg-color); }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .logo { font-size: 1.2rem; font-weight: 400; letter-spacing: 2px; }
        .version { font-size: 0.8rem; color: var(--text-secondary); }

        .btn {
            width: 100%; padding: 0.8rem; border: 1px solid var(--border-color);
            background: transparent; color: var(--text-primary); cursor: pointer;
            font-size: 0.85rem; letter-spacing: 1px; transition: all 0.3s ease;
            text-align: center; display: inline-flex; justify-content: center;
            align-items: center; gap: 0.5rem;
        }

        .btn:hover:not(:disabled) { background: var(--accent-color); color: var(--bg-color); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .primary-btn { border-color: var(--text-primary); }
        .export-btn { background: var(--text-primary); color: var(--bg-color); margin-top: auto; }
        .export-btn:hover { background: #cccccc; }

        .history-controls { display: flex; gap: 0.5rem; }
        .history-btn { padding: 0.5rem; font-size: 0.8rem; }

        .panel-section {
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .section-header { font-size: 0.8rem; color: var(--accent-color); letter-spacing: 1px; text-transform: uppercase; }
        
        .preset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }
        .preset-quick-btn { padding: 0.5rem; font-size: 0.7rem; text-transform: none; letter-spacing: 0.5px; border-color: #333; }

        .recipe-input {
            width: 100%; padding: 0.5rem; background: var(--bg-color);
            border: 1px solid var(--border-color); color: var(--text-primary);
            outline: none; font-size: 0.85rem;
        }
        select.recipe-input { cursor: pointer; }

        .control-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
        .control-header {
            display: flex; justify-content: space-between; font-size: 0.75rem;
            color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;
        }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 12px; width: 12px;
            border-radius: 50%; background: var(--accent-color);
            cursor: pointer; margin-top: -5px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 2px; cursor: pointer; background: var(--border-color);
        }

        .workspace { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; position: relative; }
        .canvas-wrapper { max-width: 100%; max-height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        
        canvas {
            max-width: 100%; max-height: 80vh; object-fit: contain;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: none;
            cursor: pointer;
        }
        #placeholderText { color: var(--text-secondary); letter-spacing: 1px; }
        #compareHint { font-size: 0.8rem; color: var(--text-secondary); margin-top: 1rem; display: none; letter-spacing: 0.5px; }

        .controls-title {
            font-size: 0.8rem; color: var(--accent-color); border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem; margin-top: 1rem; letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1 class="logo">RetroNow <span class="version">0.6</span></h1>
            
            <div class="upload-section">
                <label for="imageUpload" class="btn primary-btn">Fotoğraf Yükle</label>
                <input type="file" id="imageUpload" accept="image/*" hidden>
            </div>

            <!-- İkonik Kameralar ve Polarr Estetikleri -->
            <div class="panel-section">
                <div class="section-header">Analog & Polarr Filtreleri</div>
                <div class="preset-grid">
                    <button class="btn preset-quick-btn" data-preset="kodakGold">Kodak Gold 200</button>
                    <button class="btn preset-quick-btn" data-preset="kodakPortra">Kodak Portra 400</button>
                    <button class="btn preset-quick-btn" data-preset="polarrMoody">Polarr: Moody Dark</button>
                    <button class="btn preset-quick-btn" data-preset="polarrTeal">Polarr: Cinematic</button>
                    <button class="btn preset-quick-btn" data-preset="polaroid">Creamy Polaroid</button>
                    <button class="btn preset-quick-btn" data-preset="lofiVHS">Lo-Fi VHS (Bozuk)</button>
                </div>
            </div>

            <div class="panel-section">
                <div class="section-header">Tarif Defteri</div>
                <input type="text" id="recipeName" class="recipe-input" placeholder="Tarifine bir isim ver...">
                <button class="btn" id="saveRecipeBtn">Bu Tarifi Kaydet</button>
                
                <select id="recipeList" class="recipe-input">
                    <option value="">Kaydedilmiş Tarif Seç...</option>
                </select>
                <button class="btn" id="loadRecipeBtn">Seçili Tarifi Uygula</button>
                <button class="btn" id="deleteRecipeBtn" style="border-color: #552222; color: #ff8888;">Tarifi Sil</button>
            </div>

            <div class="history-controls">
                <button class="btn history-btn" id="undoBtn" disabled>&#8592; Geri</button>
                <button class="btn history-btn" id="redoBtn" disabled>İleri &#8594;</button>
            </div>

            <div class="presets-section">
                <button class="btn preset-btn" id="resetBtn">Tümünü Sıfırla</button>
            </div>

            <div class="controls-title">Kamera & Renk Ayarları (Sliders)</div>
            <div class="controls-container" id="controls"></div>

            <div class="export-section">
                <button class="btn export-btn" id="downloadBtn">Yüksek Çözünürlüklü İndir</button>
            </div>
        </aside>

        <main class="workspace">
            <div class="canvas-wrapper">
                <canvas id="photoCanvas"></canvas>
                <p id="placeholderText">Bir fotoğraf yükleyerek başlayın.</p>
            </div>
            <p id="compareHint">Orijinal hali görmek için fotoğrafın üzerine basılı tutun.</p>
        </main>
    </div>

    <script>
        const state = { image: null, settings: {}, showOriginal: false };
        let history = [];
        let historyIndex = -1;

        // --- GÜNCELLENMİŞ AYAR LİSTESİ (KAMERA KUSURLARI EKLENDİ) ---
        const filterConfig = [
            // Renk ve Işık
            { id: 'exposure', label: 'Pozlama (Exposure)', min: -100, max: 100, default: 0, unit: '' },
            { id: 'brilliance', label: 'Canlılık (Brilliance)', min: -100, max: 100, default: 0, unit: '' },
            { id: 'highlights', label: 'Parlak Alanlar (Highlights)', min: -100, max: 100, default: 0, unit: '' },
            { id: 'shadows', label: 'Gölgeler (Shadows)', min: -100, max: 100, default: 0, unit: '' },
            { id: 'contrast', label: 'Kontrast (Contrast)', min: -100, max: 100, default: 0, unit: '' },
            { id: 'brightness', label: 'Parlaklık (Brightness)', min: -100, max: 100, default: 0, unit: '' },
            { id: 'saturation', label: 'Doygunluk (Saturation)', min: -100, max: 100, default: 0, unit: '' },
            { id: 'vibrance', label: 'Titreşim (Vibrance)', min: -100, max: 100, default: 0, unit: '' },
            { id: 'warmth', label: 'Sıcaklık (Warmth)', min: -100, max: 100, default: 0, unit: '' },
            { id: 'tint', label: 'Renk Tonu (Tint)', min: -100, max: 100, default: 0, unit: '' },
            { id: 'fade', label: 'Solgunluk (Fade)', min: 0, max: 100, default: 0, unit: '' },
            { id: 'vintage', label: 'Nostaljik (Vintage)', min: 0, max: 100, default: 0, unit: '' },
            
            // Fiziksel Kamera Kusurları (Yeni)
            { id: 'degradation', label: 'Kamera Eskimesi (Low Res)', min: 0, max: 100, default: 0, unit: '%' },
            { id: 'grain', label: 'Film Greni (Analog Noise)', min: 0, max: 100, default: 0, unit: '' },
            { id: 'chromatic', label: 'Lens Sapması (Color Bleed)', min: 0, max: 100, default: 0, unit: '' },
            { id: 'vignette', label: 'Köşe Karartma (Vignette)', min: 0, max: 100, default: 0, unit: '' },
            
            // Keskinlik ve Detay
            { id: 'sharpness', label: 'Keskinlik (Sharpness)', min: 0, max: 100, default: 0, unit: '' },
            { id: 'definition', label: 'Belirginlik (Definition)', min: 0, max: 100, default: 0, unit: '' },
            { id: 'clarity', label: 'Berraklık (Clarity)', min: -100, max: 100, default: 0, unit: '' }
        ];

        // İKONİK KAMERA VE POLARR REÇETELERİ
        const builtinPresets = {
            kodakGold: { exposure: 5, brilliance: 10, highlights: -10, shadows: 5, contrast: 15, brightness: 5, saturation: 20, vibrance: 15, warmth: 35, tint: 10, fade: 5, vintage: 25, degradation: 5, grain: 45, chromatic: 10, vignette: 15, sharpness: 10, definition: 5, clarity: 0 },
            kodakPortra: { exposure: 10, brilliance: 5, highlights: -15, shadows: 15, contrast: -5, brightness: 5, saturation: 5, vibrance: 10, warmth: 15, tint: -5, fade: 10, vintage: 10, degradation: 0, grain: 25, chromatic: 5, vignette: 10, sharpness: 5, definition: 0, clarity: -5 },
            polarrMoody: { exposure: -15, brilliance: -10, highlights: -30, shadows: -10, contrast: 40, brightness: -10, saturation: -25, vibrance: -10, warmth: -10, tint: 0, fade: 0, vintage: 0, degradation: 0, grain: 10, chromatic: 0, vignette: 50, sharpness: 25, definition: 30, clarity: 20 },
            polarrTeal: { exposure: 0, brilliance: 15, highlights: 10, shadows: -20, contrast: 30, brightness: 0, saturation: 10, vibrance: 35, warmth: 20, tint: 15, fade: 0, vintage: 5, degradation: 0, grain: 15, chromatic: 5, vignette: 40, sharpness: 20, definition: 15, clarity: 10 },
            polaroid: { exposure: 15, brilliance: -10, highlights: -25, shadows: 30, contrast: -10, brightness: 10, saturation: -15, vibrance: -10, warmth: 25, tint: -10, fade: 40, vintage: 50, degradation: 15, grain: 35, chromatic: 15, vignette: 35, sharpness: 0, definition: 0, clarity: -10 },
            lofiVHS: { exposure: -5, brilliance: 10, highlights: 20, shadows: 10, contrast: 30, brightness: 0, saturation: 15, vibrance: 20, warmth: -10, tint: 25, fade: 25, vintage: 40, degradation: 80, grain: 75, chromatic: 60, vignette: 50, sharpness: 30, definition: 20, clarity: 15 }
        };

        const uploadInput = document.getElementById('imageUpload');
        const canvas = document.getElementById('photoCanvas');
        const ctx = canvas.getContext('2d');
        const placeholder = document.getElementById('placeholderText');
        const compareHint = document.getElementById('compareHint');
        const controlsContainer = document.getElementById('controls');
        
        const undoBtn = document.getElementById('undoBtn');
        const redoBtn = document.getElementById('redoBtn');
        const recipeNameInput = document.getElementById('recipeName');
        const saveRecipeBtn = document.getElementById('saveRecipeBtn');
        const recipeList = document.getElementById('recipeList');
        const loadRecipeBtn = document.getElementById('loadRecipeBtn');
        const deleteRecipeBtn = document.getElementById('deleteRecipeBtn');

        function initApp() {
            filterConfig.forEach(config => {
                state.settings[config.id] = config.default;

                const group = document.createElement('div');
                group.className = 'control-group';
                group.innerHTML = `
                    <div class="control-header">
                        <span>${config.label}</span>
                        <span id="${config.id}-val">${config.default}${config.unit}</span>
                    </div>
                    <input type="range" id="${config.id}" min="${config.min}" max="${config.max}" value="${config.default}">
                `;
                controlsContainer.appendChild(group);

                const slider = document.getElementById(config.id);
                const valDisplay = document.getElementById(`${config.id}-val`);

                slider.addEventListener('input', (e) => {
                    state.settings[config.id] = parseFloat(e.target.value);
                    valDisplay.innerText = `${e.target.value}${config.unit}`;
                    renderImage();
                });

                slider.addEventListener('change', () => saveToHistory());
            });

            document.querySelectorAll('.preset-quick-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const presetKey = e.target.getAttribute('data-preset');
                    if (builtinPresets[presetKey]) {
                        // Reset all first to ensure clean application
                        filterConfig.forEach(c => state.settings[c.id] = c.default);
                        // Apply preset
                        Object.keys(builtinPresets[presetKey]).forEach(k => {
                            state.settings[k] = builtinPresets[presetKey][k];
                        });
                        updateSlidersFromState();
                        renderImage();
                        saveToHistory();
                    }
                });
            });

            setupCompareEvents();
            saveToHistory();
            loadRecipesToDropdown();
        }

        function setupCompareEvents() {
            const startCompare = () => { if (!state.image) return; state.showOriginal = true; renderImage(); };
            const endCompare = () => { if (!state.image) return; state.showOriginal = false; renderImage(); };
            canvas.addEventListener('mousedown', startCompare);
            canvas.addEventListener('mouseup', endCompare);
            canvas.addEventListener('mouseleave', endCompare);
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startCompare(); });
            canvas.addEventListener('touchend', (e) => { e.preventDefault(); endCompare(); });
        }

        function loadRecipesToDropdown() {
            const recipes = JSON.parse(localStorage.getItem('retroRecipes')) || {};
            recipeList.innerHTML = '<option value="">Kaydedilmiş Tarif Seç...</option>';
            for (const name in recipes) {
                const option = document.createElement('option');
                option.value = name;
                option.innerText = name;
                recipeList.appendChild(option);
            }
        }

        saveRecipeBtn.addEventListener('click', () => {
            const name = recipeNameInput.value.trim();
            if (!name) return alert('Lütfen tarifinize bir isim verin.');
            const recipes = JSON.parse(localStorage.getItem('retroRecipes')) || {};
            recipes[name] = JSON.parse(JSON.stringify(state.settings));
            localStorage.setItem('retroRecipes', JSON.stringify(recipes));
            recipeNameInput.value = '';
            loadRecipesToDropdown();
        });

        loadRecipeBtn.addEventListener('click', () => {
            const name = recipeList.value;
            if (!name) return;
            const recipes = JSON.parse(localStorage.getItem('retroRecipes')) || {};
            if (recipes[name]) {
                state.settings = JSON.parse(JSON.stringify(recipes[name]));
                updateSlidersFromState();
                renderImage();
                saveToHistory();
            }
        });

        deleteRecipeBtn.addEventListener('click', () => {
            const name = recipeList.value;
            if (!name) return;
            const recipes = JSON.parse(localStorage.getItem('retroRecipes')) || {};
            delete recipes[name];
            localStorage.setItem('retroRecipes', JSON.stringify(recipes));
            loadRecipesToDropdown();
        });

        function updateSlidersFromState() {
            filterConfig.forEach(config => {
                const slider = document.getElementById(config.id);
                if (slider) {
                    slider.value = state.settings[config.id];
                    document.getElementById(`${config.id}-val`).innerText = `${state.settings[config.id]}${config.unit}`;
                }
            });
        }

        function saveToHistory() {
            if (historyIndex < history.length - 1) { history = history.slice(0, historyIndex + 1); }
            history.push(JSON.parse(JSON.stringify(state.settings)));
            historyIndex++;
            updateHistoryButtons();
        }

        function updateHistoryButtons() {
            undoBtn.disabled = historyIndex <= 0;
            redoBtn.disabled = historyIndex >= history.length - 1;
        }

        undoBtn.addEventListener('click', () => {
            if (historyIndex > 0) {
                historyIndex--;
                state.settings = JSON.parse(JSON.stringify(history[historyIndex]));
                updateSlidersFromState();
                renderImage();
                updateHistoryButtons();
            }
        });

        redoBtn.addEventListener('click', () => {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                state.settings = JSON.parse(JSON.stringify(history[historyIndex]));
                updateSlidersFromState();
                renderImage();
                updateHistoryButtons();
            }
        });

        uploadInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    state.image = img;
                    canvas.width = img.width;
                    canvas.height = img.height;
                    canvas.style.display = 'block';
                    placeholder.style.display = 'none';
                    compareHint.style.display = 'block';
                    renderImage();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function renderImage() {
            if (!state.image) return;

            const w = canvas.width;
            const h = canvas.height;
            
            if (state.showOriginal) {
                ctx.filter = 'none';
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1.0;
                ctx.drawImage(state.image, 0, 0, w, h);
                return;
            }

            const s = state.settings;
            
            // Renk ve Filtre Hesaplamaları
            const brightness = 100 + s.brightness + s.exposure + (s.highlights * 0.3) + (s.brilliance * 0.2);
            const contrast = 100 + s.contrast + (s.clarity * 0.5) + (s.definition * 0.3) - (s.fade * 0.3);
            const saturation = 100 + s.saturation + (s.vibrance * 0.5);
            const sepia = (s.warmth > 0 ? s.warmth : 0) + (s.vintage * 0.5);
            const hueRotate = s.tint; 
            
            ctx.filter = `
                brightness(${brightness}%)
                contrast(${contrast}%)
                saturate(${saturation}%)
                sepia(${sepia}%)
                hue-rotate(${hueRotate}deg)
            `;

            // Kamera Eskimesi (Düşük Çözünürlük Simülasyonu)
            if (s.degradation > 0) {
                const pixelScale = 1 - (s.degradation / 110); // Pikselleşme oranı
                const dw = w * pixelScale;
                const dh = h * pixelScale;
                
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = dw;
                tempCanvas.height = dh;
                const tCtx = tempCanvas.getContext('2d');
                tCtx.drawImage(state.image, 0, 0, dw, dh);
                
                ctx.imageSmoothingEnabled = false; // Pikselli/Kaba görüntü için
                ctx.globalCompositeOperation = 'source-over';
                ctx.drawImage(tempCanvas, 0, 0, w, h);
                ctx.imageSmoothingEnabled = true;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.drawImage(state.image, 0, 0, w, h);
            }
            
            ctx.filter = 'none';

            // Soğukluk
            if (s.warmth < 0) {
                ctx.fillStyle = `rgba(0, 100, 255, ${Math.abs(s.warmth) / 500})`;
                ctx.fillRect(0, 0, w, h);
            }

            // Gölgeler
            if (s.shadows > 0) {
                ctx.globalCompositeOperation = 'screen';
                ctx.fillStyle = `rgba(100, 100, 100, ${s.shadows / 300})`;
                ctx.fillRect(0, 0, w, h);
            } else if (s.shadows < 0) {
                ctx.globalCompositeOperation = 'multiply';
                ctx.fillStyle = `rgba(0, 0, 0, ${Math.abs(s.shadows) / 500})`;
                ctx.fillRect(0, 0, w, h);
            }

            // Solgunluk
            if (s.fade > 0 || s.vintage > 0) {
                const combinedFade = (s.fade + (s.vintage * 0.5)) / 200;
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = `rgba(110, 100, 90, ${combinedFade})`;
                ctx.fillRect(0, 0, w, h);
            }

            // Lens Sapması (Chromatic Aberration - Renk Sızması)
            if (s.chromatic > 0) {
                const offset = s.chromatic * (w / 1500);
                ctx.globalCompositeOperation = 'screen';
                ctx.globalAlpha = 0.6;
                ctx.drawImage(canvas, offset, 0);
                ctx.fillStyle = `rgba(255, 0, 0, 0.3)`;
                ctx.fillRect(0, 0, w, h);
                ctx.drawImage(canvas, -offset, 0);
                ctx.fillStyle = `rgba(0, 200, 255, 0.3)`;
                ctx.fillRect(0, 0, w, h);
                ctx.globalAlpha = 1.0;
            }

            // Köşe Karartma
            if (s.vignette > 0) {
                const gradient = ctx.createRadialGradient(w/2, h/2, w*0.3, w/2, h/2, w*0.8);
                gradient.addColorStop(0, 'rgba(0,0,0,0)');
                gradient.addColorStop(1, `rgba(0,0,0,${s.vignette / 100})`);
                ctx.globalCompositeOperation = 'multiply';
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, w, h);
            }

            // Film Greni (Noise)
            if (s.grain > 0) {
                ctx.globalCompositeOperation = 'overlay';
                ctx.globalAlpha = s.grain / 150;
                
                const pCanvas = document.createElement('canvas');
                pCanvas.width = 150;
                pCanvas.height = 150;
                const pCtx = pCanvas.getContext('2d');
                const imgData = pCtx.createImageData(150, 150);
                for (let i = 0; i < imgData.data.length; i += 4) {
                    const noise = Math.random() * 255;
                    imgData.data[i] = noise;
                    imgData.data[i+1] = noise;
                    imgData.data[i+2] = noise;
                    imgData.data[i+3] = 255;
                }
                pCtx.putImageData(imgData, 0, 0);
                ctx.fillStyle = ctx.createPattern(pCanvas, 'repeat');
                ctx.fillRect(0, 0, w, h);
                ctx.globalAlpha = 1.0;
            }

            // Keskinlik (Sharpness)
            if (s.sharpness > 0) {
                ctx.globalCompositeOperation = 'overlay';
                ctx.globalAlpha = s.sharpness / 200;
                ctx.drawImage(canvas, -1, -1);
                ctx.globalAlpha = 1.0;
            }
        }

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (!state.image) return;
            const link = document.createElement('a');
            link.download = 'RetroNow_Edit.jpg';
            link.href = canvas.toDataURL('image/jpeg', 1.0);
            link.click();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            filterConfig.forEach(c => state.settings[c.id] = c.default);
            updateSlidersFromState();
            renderImage();
            saveToHistory();
        });

        initApp();
    </script>
</body>
</html>
